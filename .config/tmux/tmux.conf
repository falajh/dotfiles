#keymaps
unbind C-b
set -g prefix M-s
bind-key -n M-w choose-session
bind-key -r f run-shell "tmux neww tmux-sessionizer"

#count from one
set -g base-index 1
set -g pane-base-index 1


#reset
unbind r
bind r source ~/.config/tmux/tmux.conf

#colors
set -g default-terminal "${TERM}"
set -sg terminal-overrides ",*:RGB"

#the bar
#set -g status-position top
set -g status-style "bg=black"
set -g status-right "#{?client_prefix,#[fg=green] PREFIX #[default],}"
set -g status-left "#[fg=yellow,bright]#S #{?client_prefix,#[fg=green] PREFIX #[default],}"

#window buttons
set -g window-status-format ""
set -g window-status-current-format ""

# panes
set -g pane-border-lines simple

# QOL
set -g mouse on
# Enter copy-mode with C-u if not already
#bind -n C-u copy-mode \; send -X halfpage-up

# Automatically set terminal title to session name
set -g set-titles on
set -g set-titles-string 'tmux: #S'
